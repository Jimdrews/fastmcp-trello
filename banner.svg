<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="280" viewBox="0 0 1280 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1220"/>
      <stop offset="50%" style="stop-color:#172042"/>
      <stop offset="100%" style="stop-color:#0c1220"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0079BF;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#0079BF;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0079BF;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="280" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="70" x2="1280" y2="70" stroke="white" stroke-width="1"/>
    <line x1="0" y1="140" x2="1280" y2="140" stroke="white" stroke-width="1"/>
    <line x1="0" y1="210" x2="1280" y2="210" stroke="white" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="280" stroke="white" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="280" stroke="white" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="280" stroke="white" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="280" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="280" stroke="white" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="280" stroke="white" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="280" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative glow line -->
  <rect x="0" y="138" width="1280" height="2" fill="url(#glow)" opacity="0.5"/>

  <!-- Left side: Mini Trello board mockup -->
  <g transform="translate(60, 30)" opacity="0.6">
    <!-- Board column 1 -->
    <rect x="0" y="0" width="90" height="220" rx="6" fill="#1a2744" filter="url(#shadow)"/>
    <rect x="6" y="6" width="78" height="12" rx="3" fill="#0079BF" opacity="0.6"/>
    <rect x="6" y="24" width="78" height="36" rx="3" fill="#243352"/>
    <rect x="6" y="66" width="78" height="28" rx="3" fill="#243352"/>
    <rect x="6" y="100" width="78" height="40" rx="3" fill="#243352"/>
    <rect x="6" y="146" width="78" height="28" rx="3" fill="#243352"/>
    <rect x="10" y="28" width="24" height="5" rx="2" fill="#61BD4F"/>
    <rect x="10" y="70" width="18" height="5" rx="2" fill="#F2D600"/>
    <rect x="10" y="104" width="30" height="5" rx="2" fill="#FF9F1A"/>
    <rect x="10" y="150" width="16" height="5" rx="2" fill="#EB5A46"/>

    <!-- Board column 2 -->
    <rect x="98" y="0" width="90" height="200" rx="6" fill="#1a2744" filter="url(#shadow)"/>
    <rect x="104" y="6" width="78" height="12" rx="3" fill="#61BD4F" opacity="0.6"/>
    <rect x="104" y="24" width="78" height="32" rx="3" fill="#243352"/>
    <rect x="104" y="62" width="78" height="44" rx="3" fill="#243352"/>
    <rect x="104" y="112" width="78" height="32" rx="3" fill="#243352"/>
    <rect x="108" y="28" width="20" height="5" rx="2" fill="#0079BF"/>
    <rect x="108" y="66" width="26" height="5" rx="2" fill="#EB5A46"/>

    <!-- Board column 3 -->
    <rect x="196" y="0" width="90" height="165" rx="6" fill="#1a2744" filter="url(#shadow)"/>
    <rect x="202" y="6" width="78" height="12" rx="3" fill="#C377E0" opacity="0.6"/>
    <rect x="202" y="24" width="78" height="40" rx="3" fill="#243352"/>
    <rect x="202" y="70" width="78" height="32" rx="3" fill="#243352"/>
    <rect x="206" y="28" width="16" height="5" rx="2" fill="#61BD4F"/>
    <rect x="226" y="28" width="16" height="5" rx="2" fill="#F2D600"/>
  </g>

  <!-- Connection lines -->
  <g opacity="0.15">
    <path d="M 365 130 Q 400 130 420 118" stroke="#0079BF" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
    <path d="M 365 140 Q 405 140 430 140" stroke="#0079BF" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
    <path d="M 365 150 Q 400 150 420 162" stroke="#0079BF" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  </g>

  <!-- AI sparkle icon -->
  <g transform="translate(430, 128)" opacity="0.3" filter="url(#glowFilter)">
    <path d="M 12 0 L 15 9 L 24 12 L 15 15 L 12 24 L 9 15 L 0 12 L 9 9 Z" fill="#64ffda"/>
  </g>

  <!-- Main content -->
  <!-- Title -->
  <text x="730" y="100" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">fastmcp-trello</text>

  <!-- Subtitle -->
  <text x="730" y="140" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" fill="#8892b0" text-anchor="middle" font-weight="400">Trello MCP Server for AI Assistants</text>

  <!-- Tag pills -->
  <g transform="translate(730, 195)">
    <!-- Python pill -->
    <rect x="-195" y="-14" width="80" height="28" rx="14" fill="#3776AB" opacity="0.2" stroke="#3776AB" stroke-width="1" stroke-opacity="0.4"/>
    <text x="-155" y="5" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#5B9BD5" text-anchor="middle" font-weight="600">Python</text>

    <!-- MCP pill -->
    <rect x="-80" y="-14" width="60" height="28" rx="14" fill="#64ffda" opacity="0.1" stroke="#64ffda" stroke-width="1" stroke-opacity="0.3"/>
    <text x="-50" y="5" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#64ffda" text-anchor="middle" font-weight="600">MCP</text>

    <!-- FastMCP pill -->
    <rect x="15" y="-14" width="90" height="28" rx="14" fill="#FF6B6B" opacity="0.15" stroke="#FF6B6B" stroke-width="1" stroke-opacity="0.3"/>
    <text x="60" y="5" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#FF8A8A" text-anchor="middle" font-weight="600">FastMCP</text>

    <!-- MIT pill -->
    <rect x="140" y="-14" width="56" height="28" rx="14" fill="#F2D600" opacity="0.12" stroke="#F2D600" stroke-width="1" stroke-opacity="0.3"/>
    <text x="168" y="5" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#F2D600" text-anchor="middle" font-weight="600">MIT</text>
  </g>

  <!-- Install hint -->
  <g transform="translate(730, 245)">
    <rect x="-115" y="-14" width="230" height="28" rx="5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="0" y="4" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="12" fill="#7ee787" text-anchor="middle">$ uvx fastmcp-trello</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="276" width="1280" height="4" fill="#0079BF" opacity="0.8"/>
</svg>
